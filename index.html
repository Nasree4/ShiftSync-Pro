    // Helper: generate stable shift cycles
    function generateShiftCycle(staffId, index) {
      const cycles = {
        STF001: ["M", "M", "OFF", "M", "M", "OFF", "E", "OFF"],
        STF002: ["M", "M", "E", "E", "N", "N", "OFF", "OFF"],
        STF003: ["E", "E", "N", "N", "OFF", "OFF", "M", "M"],
        STF004: ["N", "N", "OFF", "OFF", "M", "M", "E", "E"],
        STF005: ["M", "E", "OFF", "M", "E", "OFF", "M", "OFF"],
        STF006: ["OFF", "M", "M", "E", "E", "N", "N", "OFF"],
        STF007: ["E", "OFF", "M", "E", "OFF", "M", "E", "OFF"],
        STF008: ["M", "M", "OFF", "M", "M", "OFF", "E", "OFF"]
      };
      const cycle = cycles[staffId] || ["M", "E", "N", "OFF"];
      return cycle[index % cycle.length];
    }

    function getInitialShifts(staffList, daysInMonthCount = 31) {
      const shifts = {};
      staffList.forEach(staff => {
        shifts[staff.id] = {};
        for (let d = 1; d <= daysInMonthCount; d++) {
          shifts[staff.id][d] = generateShiftCycle(staff.id, d);
        }
      });
      return shifts;
    }

        }

      useEffect(() => {
        if (!firebaseDb) return;

          }
        };

        const staffRef = firebaseDb.ref("staff");

          const val = snapshot.val();
          if (val) {
            setStaffList(val);
          } else {
            staffRef.set(INITIAL_STAFF);
          }
        }, handleSyncError);

        // Sync shifts roster matrix
        const shiftsRef = firebaseDb.ref("shifts");

            setShiftMaster(val);
          } else {
            const defaultShifts = { "2026-07": getInitialShifts(INITIAL_STAFF, 31) };

        const swapsRef = firebaseDb.ref("swaps");
        swapsRef.on("value", snapshot => {
          const val = snapshot.val();
          if (val) {
            const arr = Array.isArray(val) ? val.filter(Boolean) : Object.keys(val).map(k => val[k]);
            setSwapRequests(arr);
          } else {
            swapsRef.set([]);
          }
        }, handleSyncError);

        // Sync notifications
        const notifRef = firebaseDb.ref("notifications");

          const val = snapshot.val();

        }, handleSyncError);

          shiftsRef.off();
          swapsRef.off();

        const container = scrollContainerRef.current;

        container.scrollTo({ left: leftScroll, behavior: "smooth" });
        addToast(`เลื่อนไปวันที่ ${startDay}-${Math.min(startDay + 9, monthDateProperties.daysCount)}`, "info");
      };

      const handleCellClick = (staffId, date, currentShift) => {

        const employee = staffList.find(s => s.id === staffId);

            <div class="bg-slate-50/50 px-6 py-4 border-t border-slate-100 flex flex-wrap gap-4 text-xs font-semibold text-slate-500">
              <span class="text-slate-400">คำอธิบายกะเวร:</span>
              <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200 flex items-center justify-center font-bold text-[10px]">M</span>
                <span>เวรเช้า (08:00 - 16:00)</span>

              <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-lg bg-amber-50 text-amber-700 border border-amber-200 flex items-center justify-center font-bold text-[10px]">E</span>

    // --- Tab 2: Interactive Calendar View ---
    function InteractiveCalendar({ staffList, selectedMonth, activeMonthlyShifts, monthDateProperties }) {
      const [selectedDate, setSelectedDate] = useState(1);

      // Get list of scheduled staff for a particular day
      const getStaffOnDuty = (day) => {
        const list = [];
        staffList.forEach(staff => {
          const shift = (activeMonthlyShifts[staff.id] && activeMonthlyShifts[staff.id][day]) || "OFF";
          if (shift !== "OFF") {
            list.push({
              staff,
              shiftCode: shift,
              shiftObj: SHIFT_TYPES[shift]
            });
          }
        });
        return list;
      };

      const calendarBoxes = [];
      for (let i = 0; i < monthDateProperties.startDayIndex; i++) {
        calendarBoxes.push(null);
      }
      for (let d = 1; d <= monthDateProperties.daysCount; d++) {
        calendarBoxes.push(d);
      }
      while (calendarBoxes.length % 7 !== 0) {
        calendarBoxes.push(null);
      }

      const activeDayStaff = getStaffOnDuty(selectedDate);

      return (
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2 bg-white rounded-3xl border border-slate-100 shadow-premium p-6 space-y-4">
            <div class="flex items-center justify-between font-sans">
              <h3 class="font-bold text-base text-slate-800">ปฏิทินปฏิบัติงานประจำเดือน</h3>
              <div class="text-xs text-slate-500 font-semibold bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-lg">
                เดือน {selectedMonth}
              </div>
            </div>

            <div class="grid grid-cols-7 gap-1.5 text-center">
              {DAY_NAMES.map((name, i) => (
                <div key={name} className={`py-2 text-[11px] font-bold uppercase tracking-wider ${i === 0 || i === 6 ? "text-rose-500" : "text-slate-400"}`}>
                  {name}
                </div>
              ))}

              {calendarBoxes.map((day, idx) => {
                if (day === null) {
                  return <div key={`empty-${idx}`} class="bg-slate-50/20 rounded-2xl border border-slate-50 aspect-square min-h-[48px]" />;
                }

                const dayStaff = getStaffOnDuty(day);
                const isSelected = selectedDate === day;
                const dayOfWeek = (monthDateProperties.startDayIndex + day - 1) % 7;
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                return (
                  <button
                    key={`day-${day}`}
                    onClick={() => setSelectedDate(day)}
                    className={`aspect-square p-1 border rounded-2xl transition-all relative flex flex-col justify-between cursor-pointer min-h-[48px] ${
                      isSelected 
                        ? "bg-brand-50 border-brand-500 ring-2 ring-brand-100" 
                        : isWeekend 
                          ? "bg-rose-50/20 border-rose-100/50 hover:bg-slate-50" 
                          : "bg-white border-slate-100 hover:bg-slate-50"
                    }`}
                  >
                    <span className={`text-xs font-bold ${
                      isSelected 
                        ? "text-brand-700" 
                        : isWeekend 
                          ? "text-rose-500" 
                          : "text-slate-600"
                    }`}>
                      {day}
                    </span>

                    {/* Desktop View */}
                    <div class="hidden sm:flex flex-col gap-0.5 w-full mt-1 items-start text-[8px] overflow-hidden">
                      {dayStaff.slice(0, 2).map((item, id) => (
                        <div key={id} className={`px-1.5 py-0.5 rounded w-full text-left truncate leading-tight border ${
                          item.shiftCode === "M" ? "bg-emerald-50 text-emerald-700 border-emerald-100" :
                          item.shiftCode === "E" ? "bg-amber-50 text-amber-700 border-amber-100" :
                          "bg-indigo-50 text-indigo-700 border-indigo-100"
                        }`}>
                          {item.staff.name.split(" ")[0]} ({item.shiftCode})
                        </div>
                      ))}
                      {dayStaff.length > 2 && (
                        <span class="text-[7px] text-slate-400 font-bold px-1.5">+{dayStaff.length - 2} คน</span>
                      )}
                    </div>

                    {/* Mobile Dot Indicators */}
                    <div class="flex sm:hidden justify-center gap-0.5 w-full mt-auto mb-0.5">
                      {dayStaff.map((item, id) => (
                        <span 
                          key={id} 
                          className={`w-1.5 h-1.5 rounded-full ${
                            item.shiftCode === "M" ? "bg-emerald-500" :
                            item.shiftCode === "E" ? "bg-amber-500" :
                            "bg-indigo-500"
                          }`}
                        />
                      ))}
                    </div>

                  </button>
                );
              })}
            </div>
          </div>

          {/* Slide up Day Detail Panel */}
          <div class="bg-white rounded-3xl border border-slate-100 shadow-premium p-6 space-y-6 flex flex-col justify-between font-sans">
            <div class="space-y-4">
              <div class="border-b border-slate-100 pb-4">
                <h4 class="font-bold text-slate-800 text-base">แผงสรุปรายวัน (Day Detail)</h4>
                <p class="text-xs text-brand-600 font-semibold mt-1">วันที่ {selectedDate} • {selectedMonth}</p>
              </div>

              <div class="space-y-3.5">
                {activeDayStaff.length === 0 ? (
                  <div class="text-center py-8 text-slate-400 text-sm">
                    ไม่มีบุคลากรปฏิบัติงานในวันนี้ (วันหยุดทั้งหมด)
                  </div>
                ) : (
                  ["M", "E", "N"].map(code => {
                    const shiftGroup = activeDayStaff.filter(item => item.shiftCode === code);
                    if (shiftGroup.length === 0) return null;

                    return (
                      <div key={code} class="space-y-2">
                        <div class="flex items-center gap-2">
                          <span className={`px-2 py-0.5 rounded-lg text-[10px] font-bold border uppercase ${SHIFT_TYPES[code].badgeClass}`}>
                            {code}
                          </span>
                          <span class="text-xs font-semibold text-slate-500">{SHIFT_TYPES[code].name} ({SHIFT_TYPES[code].time})</span>
                        </div>

                        <div class="grid gap-2 pl-6">
                          {shiftGroup.map(({ staff }) => (
                            <div key={staff.id} class="flex items-center gap-3 p-2.5 rounded-xl bg-slate-50 border border-slate-100">
                              <span class="text-xl leading-none">{staff.avatar}</span>
                              <div class="min-w-0 flex-1">
                                <div class="font-semibold text-xs text-slate-700 leading-tight">{staff.name}</div>
                                <div class="text-[9px] text-slate-400 mt-0.5">{staff.role} • {staff.dept}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-xs text-slate-500 font-medium">
              <div class="flex justify-between items-center">
                <span>พนักงานขึ้นเวรวันนี้:</span>
                <span class="font-bold text-slate-700 text-sm">{activeDayStaff.length} คน</span>
              </div>
            </div>

          </div>

        </div>
      );
    }

    // --- Tab 3: Personal Dashboard View ("My Shifts") ---
    function MyShifts({ activeUser, shiftMaster, selectedMonth, setSelectedMonth, setActiveTab }) {
      
      const userShifts = useMemo(() => {
        const shifts = [];
        const monthShifts = shiftMaster[selectedMonth] || {};
        const personalShiftMap = monthShifts[activeUser.id] || {};
        
        // Calculate days count dynamically
        const [year, monthStr] = selectedMonth.split("-").map(Number);
        const daysCount = new Date(year, monthStr, 0).getDate();

        for (let d = 1; d <= daysCount; d++) {
          const code = personalShiftMap[d] || "OFF";
          shifts.push({ date: d, code });
        }
        return shifts;
      }, [shiftMaster, activeUser.id, selectedMonth]);

      const stats = useMemo(() => {
        const totalWorkDays = userShifts.filter(s => s.code !== "OFF").length;
        const totalHours = totalWorkDays * 8;
        const nightShifts = userShifts.filter(s => s.code === "N").length;
        return { totalWorkDays, totalHours, nightShifts };
      }, [userShifts]);

      const handleSwapRedirect = (date) => {
        sessionStorage.setItem("shiftsync_swap_auto_date", date);
        setActiveTab("swap");
      };

      return (
        <div class="space-y-6">
          
          {/* Month selector specifically for personal shifts */}
          <div class="bg-white px-4 py-3 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between gap-4 mb-4">
            <div class="flex items-center gap-2">
              <Icon name="calendar" class="w-5 h-5 text-brand-500" />
              <span class="text-xs font-bold text-slate-700">ตรวจสอบเวรของฉันประจำเดือน:</span>
            </div>
            
            <select
              value={selectedMonth}
              onChange={(e) => setSelectedMonth(e.target.value)}
              class="bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold rounded-xl px-3.5 py-2 focus:outline-none focus:ring-1 focus:ring-brand-500 cursor-pointer min-h-[40px]"
            >
              {MONTHS_LIST.map(m => (
                <option key={m.key} value={m.key}>
                  {m.label}
                </option>
              ))}
            </select>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-500">
                <Icon name="clock" className="w-6 h-6" />
              </div>
              <div>

    // --- Tab 4: Swap Center Workflow View ---
    function SwapWorkflow({ staffList, activeUser, shiftMaster, selectedMonth, swapRequests, writeSwaps, addToast, sendNotification }) {
      const [reqDate, setReqDate] = useState("");
      const [targetStaffId, setTargetStaffId] = useState("");
      const [targetDate, setTargetDate] = useState("");

      useEffect(() => {
        const autoDate = sessionStorage.getItem("shiftsync_swap_auto_date");
        if (autoDate) {
          setReqDate(autoDate);
          sessionStorage.removeItem("shiftsync_swap_auto_date");
        }
      }, []);

      const activeMonthlyShifts = useMemo(() => {
        return shiftMaster[selectedMonth] || {};
      }, [shiftMaster, selectedMonth]);

      // Get requester's active shifts for selected month
      const requesterShifts = useMemo(() => {
        const list = [];
        const personalShiftMap = activeMonthlyShifts[activeUser.id] || {};
        
        // Calculate days dynamically
        const [year, monthStr] = selectedMonth.split("-").map(Number);
        const daysCount = new Date(year, monthStr, 0).getDate();

        for (let d = 1; d <= daysCount; d++) {
          const code = personalShiftMap[d] || "OFF";
          if (code !== "OFF") {
            list.push({ date: d, code });
          }
        }
        return list;
      }, [activeMonthlyShifts, activeUser.id, selectedMonth]);

      // Get target's active shifts for selected month
      const targetShifts = useMemo(() => {
        if (!targetStaffId) return [];
        const list = [];
        const personalShiftMap = activeMonthlyShifts[targetStaffId] || {};
        
        const [year, monthStr] = selectedMonth.split("-").map(Number);
        const daysCount = new Date(year, monthStr, 0).getDate();

        for (let d = 1; d <= daysCount; d++) {
          const code = personalShiftMap[d] || "OFF";
          if (code !== "OFF") {
            list.push({ date: d, code });
          }
        }
        return list;
      }, [activeMonthlyShifts, targetStaffId, selectedMonth]);

      const handleCreateRequest = (e) => {
        e.preventDefault();
        if (!reqDate || !targetStaffId || !targetDate) {
          addToast("กรุณากรอกข้อมูลให้ครบถ้วนก่อนส่งคำขอ", "error");
          return;
        }

        const requesterShift = activeMonthlyShifts[activeUser.id][reqDate];
        const targetShift = activeMonthlyShifts[targetStaffId][targetDate];

        if (reqDate == targetDate) {
          addToast("ไม่สามารถสลับเวรภายในวันเดียวกันได้", "error");
          return;
        }

        const newRequest = {
          id: `req_${Math.random().toString(36).substring(2, 9)}`,
          requesterId: activeUser.id,
          targetId: targetStaffId,
          requesterDate: parseInt(reqDate),
          requesterShift,
          targetDate: parseInt(targetDate),
          targetShift,
          status: "pending_target",
          monthKey: selectedMonth,
          createdAt: new Date().toISOString()
        };

        writeSwaps([newRequest, ...swapRequests]);
        const targetEmployee = staffList.find(s => s.id === targetStaffId);
        
        sendNotification(
          targetStaffId,
          "คำขอแลกเวรใหม่",
          `${activeUser.name} ต้องการขอแลกเวรกับคุณ (${SHIFT_TYPES[requesterShift].name} วันที่ ${reqDate} ของเขา กับ ${SHIFT_TYPES[targetShift].name} วันที่ ${targetDate} ของคุณ)`
        );

        addToast(`ส่งคำขอแลกเวรถึงคุณ${targetEmployee.name}เรียบร้อยแล้ว`, "success");
        setTargetStaffId("");
        setTargetDate("");
      };

      const handleTargetAccept = (requestId) => {
        const updated = swapRequests.map(r => {
          if (r.id === requestId) {
            sendNotification(
              "STF001",
              "คำขอแลกเวร รออนุมัติ",
              `พนักงานแลกเวรตกลงกันแล้ว: ${activeUser.name} และ ${staffList.find(s => s.id === r.requesterId)?.name} รอแอดมินอนุมัติขั้นตอนสุดท้าย`
            );
            return { ...r, status: "pending_admin" };
          }
          return r;
        });
        writeSwaps(updated);
        addToast("คุณได้กดตอบรับคำขอแลกเวรแล้ว (ส่งต่อไปยังหัวหน้างานเพื่อพิจารณา)", "success");
      };

      const handleTargetDecline = (requestId) => {
        const updated = swapRequests.map(r => {
          if (r.id === requestId) {
            sendNotification(
              r.requesterId,
              "คำขอแลกเวรถูกปฏิเสธ",
              `คุณ${activeUser.name} ได้ปฏิเสธคำขอแลกเวรของคุณแล้ว`
            );
            return { ...r, status: "declined" };
          }
          return r;
        });
        writeSwaps(updated);
        addToast("คุณปฏิเสธคำขอแลกเวรแล้ว", "info");
      };

      const incomingRequests = useMemo(() => {
        return swapRequests.filter(r => r.targetId === activeUser.id && r.status === "pending_target" && r.monthKey === selectedMonth);
      }, [swapRequests, activeUser.id, selectedMonth]);

      const sentRequests = useMemo(() => {
        return swapRequests.filter(r => r.requesterId === activeUser.id && r.monthKey === selectedMonth);
      }, [swapRequests, activeUser.id, selectedMonth]);

      return (
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 font-sans">
          
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-premium space-y-6">
            <div class="border-b border-slate-100 pb-4">
              <h3 class="font-bold text-base text-slate-800">ส่งคำขอสลับเวร ประจำเดือน</h3>
              <p class="text-xs text-slate-400 mt-1">สลับกะปฏิบัติงานของคุณกับเพื่อนในเดือน {selectedMonth}</p>
            </div>

            <form onSubmit={handleCreateRequest} class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">เวรของคุณที่ต้องการแลก</label>
                <select
                  value={reqDate}
                  onChange={(e) => setReqDate(e.target.value)}
                  class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500/20 font-semibold cursor-pointer min-h-[44px]"
                >
                  <option value="">-- เลือกเวรของคุณ --</option>
                  {requesterShifts.map(({ date, code }) => (
                    <option key={date} value={date}>
                      วันที่ {date} • เวร {code} ({SHIFT_TYPES[code].name})
                    </option>
                  ))}
                </select>
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">เลือกเพื่อนพนักงานที่ขอแลกด้วย</label>
                <select
                  value={targetStaffId}
                  onChange={(e) => {
                    setTargetStaffId(e.target.value);
                    setTargetDate("");
                  }}
                  class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500/20 font-semibold cursor-pointer min-h-[44px]"
                >
                  <option value="">-- เลือกพนักงาน --</option>
                  {staffList.filter(s => s.id !== activeUser.id).map(s => (
                    <option key={s.id} value={s.id}>
                      {s.avatar} {s.name} ({s.role})
                    </option>
                  ))}
                </select>
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">เลือกเวรของเพื่อนที่คุณต้องการ</label>
                <select
                  value={targetDate}
                  onChange={(e) => setTargetDate(e.target.value)}
                  disabled={!targetStaffId}
                  class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500/20 font-semibold cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed min-h-[44px]"
                >
                  <option value="">-- เลือกเวรของเพื่อน --</option>
                  {targetShifts.map(({ date, code }) => (
                    <option key={date} value={date}>
                      วันที่ {date} • เวร {code} ({SHIFT_TYPES[code].name})
                    </option>
                  ))}
                </select>
              </div>

              <button
                type="submit"
                class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl shadow-premium text-sm transition-all duration-200 cursor-pointer min-h-[44px] flex items-center justify-center gap-2"
              >
                <Icon name="shuffle" className="w-4 h-4" />
                <span>ส่งคำร้องขอแลกเวร</span>
              </button>

            </form>
          </div>

          <div class="lg:col-span-2 space-y-6">
            
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-premium space-y-4">
              <h3 class="font-bold text-base text-slate-800">คำร้องขอแลกเวรที่เข้ามา (Received Requests)</h3>
              
              <div class="space-y-3">
                {incomingRequests.length === 0 ? (
                  <div class="text-center py-8 text-slate-400 text-xs">
                    ไม่มีคำขอแลกเวรส่งถึงคุณในเดือนนี้
                  </div>
                ) : (
                  incomingRequests.map(r => {
                    const requester = staffList.find(s => s.id === r.requesterId) || {};
                    return (
                      <div key={r.id} class="p-4 rounded-2xl border border-slate-100 bg-slate-50/50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex items-start gap-3">
                          <span class="text-3xl mt-0.5">{requester.avatar}</span>
                          <div>
                            <div class="font-bold text-sm text-slate-800">
                              คุณ{requester.name} ({requester.role})
                            </div>
                            <p class="text-xs text-slate-500 leading-relaxed mt-1">
                              ขอแลกเวรของเขาในวันที่ <span class="font-bold text-slate-700">{r.requesterDate} ({SHIFT_TYPES[r.requesterShift].name})</span>
                              <br />
                              กับเวรของคุณในวันที่ <span class="font-bold text-slate-700">{r.targetDate} ({SHIFT_TYPES[r.targetShift].name})</span>
                            </p>
                          </div>
                        </div>

                        <div class="flex items-center gap-2 self-end md:self-auto">
                          <button
                            onClick={() => handleTargetDecline(r.id)}
                            class="bg-white hover:bg-rose-50 border border-slate-200 text-rose-600 text-xs font-bold px-4 py-2.5 rounded-xl cursor-pointer min-h-[44px] min-w-[70px] flex items-center justify-center transition-colors"
                          >
                            ปฏิเสธ
                          </button>
                          <button
                            onClick={() => handleTargetAccept(r.id)}
                            class="bg-brand-500 hover:bg-brand-600 text-white text-xs font-bold px-4.5 py-2.5 rounded-xl shadow-sm cursor-pointer min-h-[44px] min-w-[70px] flex items-center justify-center transition-colors"
                          >
                            ตกลง
                          </button>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-premium space-y-4">
              <h3 class="font-bold text-base text-slate-800">สถานะคำร้องขอแลกเวรที่คุณส่ง (Sent Requests)</h3>
              
              <div class="space-y-3">
                {sentRequests.length === 0 ? (
                  <div class="text-center py-8 text-slate-400 text-xs">
                    คุณยังไม่ได้ส่งคำขอแลกเวรในเดือนนี้
                  </div>
                ) : (
                  sentRequests.map(r => {
                    const target = staffList.find(s => s.id === r.targetId) || {};
                    return (
                      <div key={r.id} class="p-4 rounded-2xl border border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                          <div class="flex items-center gap-2">
                            <span class="text-lg">{target.avatar}</span>
                            <span class="font-semibold text-sm text-slate-700">ถึง: คุณ{target.name}</span>
                          </div>
                          <p class="text-xs text-slate-400 mt-1">
                            แลกเวรวันที่ {r.requesterDate} ({SHIFT_TYPES[r.requesterShift].name}) กับเวรเพื่อนวันที่ {r.targetDate} ({SHIFT_TYPES[r.targetShift].name})
                          </p>
                        </div>

                        <div class="self-start sm:self-auto">
                          {r.status === "pending_target" && (
                            <span class="bg-amber-50 text-amber-600 border border-amber-100 px-3 py-1.5 rounded-full text-xs font-bold">รอเพื่อนตกลง</span>
                          )}
                          {r.status === "pending_admin" && (
                            <span class="bg-indigo-50 text-indigo-600 border border-indigo-100 px-3 py-1.5 rounded-full text-xs font-bold">รอแอดมินอนุมัติ</span>
                          )}
                          {r.status === "approved" && (
                            <span class="bg-emerald-50 text-emerald-600 border border-emerald-100 px-3 py-1.5 rounded-full text-xs font-bold">อนุมัติสำเร็จ</span>
                          )}
                          {r.status === "declined" && (
                            <span class="bg-rose-50 text-rose-600 border border-rose-100 px-3 py-1.5 rounded-full text-xs font-bold">ปฏิเสธแล้ว</span>
                          )}
                          {r.status === "rejected" && (
                            <span class="bg-slate-100 text-slate-500 border border-slate-200 px-3 py-1.5 rounded-full text-xs font-bold">แอดมินไม่อนุมัติ</span>
                          )}
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>

          </div>

        </div>
      );
    }

    // --- Tab 5: Admin Panel & Firebase Config ---
    function AdminPanel({ 
      staffList, 
      writeStaff, 
      activeUser, 
      shiftMaster, 
      writeShifts, 
      selectedMonth,
      swapRequests, 
      writeSwaps, 
      addToast, 
      sendNotification,
      firebaseConfig,
      onSaveConfig,
      onBootstrap,
      isFirebaseConnected,
      monthDateProperties
    }) {
      const [newName, setNewName] = useState("");
      const [newEmail, setNewEmail] = useState("");
      const [newRole, setNewRole] = useState("Registered Nurse");
      const [newDept, setNewDept] = useState("IPD-6");
      const [newIsAdmin, setNewIsAdmin] = useState(false);
      const [newAvatar, setNewAvatar] = useState("👩⚕️");

      // Firebase Config states for input fields
      const [apiKey, setApiKey] = useState(firebaseConfig?.apiKey || "");
      const [authDomain, setAuthDomain] = useState(firebaseConfig?.authDomain || "");
      const [databaseURL, setDatabaseURL] = useState(firebaseConfig?.databaseURL || "");
      const [projectId, setProjectId] = useState(firebaseConfig?.projectId || "");
      const [appId, setAppId] = useState(firebaseConfig?.appId || "");

      const avatarList = ["👩⚕️", "👨⚕️", "👩", "👨", "👨✈️", "👩✈️", "🩺", "💉", "💊"];

      const pendingApprovals = useMemo(() => {
        return swapRequests.filter(r => r.status === "pending_admin" && r.monthKey === selectedMonth);
      }, [swapRequests, selectedMonth]);

      // Admin Approve Swap Request
      const handleApproveSwap = (req) => {
        const updatedMaster = { ...shiftMaster };
        if (!updatedMaster[selectedMonth]) updatedMaster[selectedMonth] = {};
        
        const reqShift = updatedMaster[selectedMonth][req.requesterId][req.requesterDate];
        const targShift = updatedMaster[selectedMonth][req.targetId][req.targetDate];

        // Perform swap
        updatedMaster[selectedMonth][req.requesterId][req.requesterDate] = targShift;
        updatedMaster[selectedMonth][req.targetId][req.targetDate] = reqShift;

        // Save shifts changes
        writeShifts(updatedMaster);

        // Update request status
        const updatedSwaps = swapRequests.map(r => r.id === req.id ? { ...r, status: "approved" } : r);
        writeSwaps(updatedSwaps);

        const requester = staffList.find(s => s.id === req.requesterId) || {};
        const target = staffList.find(s => s.id === req.targetId) || {};

        sendNotification(
          req.requesterId,
          "การแลกเวรอนุมัติแล้ว",
          `การขอแลกเวรของคุณในวันที่ ${req.requesterDate} กับ ${target.name} ได้รับการอนุมัติขั้นสุดท้ายจากแอดมินแล้ว`
        );
        sendNotification(
          req.targetId,
          "การแลกเวรอนุมัติแล้ว",
          `การขอแลกเวรของคุณในวันที่ ${req.targetDate} กับ ${requester.name} ได้รับการอนุมัติขั้นสุดท้ายจากแอดมินแล้ว`
        );

        addToast("อนุมัติคำร้องและปรับปรุงเวรสำเร็จเรียบร้อย", "success");
      };

      const handleRejectSwap = (requestId) => {
        const updatedSwaps = swapRequests.map(r => r.id === requestId ? { ...r, status: "rejected" } : r);
        writeSwaps(updatedSwaps);
        addToast("ปฏิเสธคำขอแลกเวรเรียบร้อย", "info");
      };

      // Register new staff
      const handleAddMember = (e) => {
        e.preventDefault();
        if (!newName || !newEmail) {
          addToast("กรุณากรอกชื่อและอีเมลให้เรียบร้อย", "error");
          return;
        }

        if (!newEmail.includes("@gmail.com")) {
          addToast("กรุณาใช้ Gmail ที่ถูกต้อง", "error");
          return;
        }

        const newId = `STF00${staffList.length + 1}`;
        const newStaff = {
          id: newId,
          name: newName,
          email: newEmail,
          role: newRole,
          dept: newDept,
          isAdmin: newIsAdmin,
          avatar: newAvatar
        };

        // Write new staff member to database
        writeStaff([...staffList, newStaff]);

        // Auto-assign schedule for the selectedMonth
        const updatedShifts = { ...shiftMaster };
        if (!updatedShifts[selectedMonth]) updatedShifts[selectedMonth] = {};
        updatedShifts[selectedMonth][newId] = {};
        for (let d = 1; d <= monthDateProperties.daysCount; d++) {
          updatedShifts[selectedMonth][newId][d] = generateShiftCycle(newId, d);
        }
        writeShifts(updatedShifts);

        addToast(`เพิ่มพนักงาน ${newName} และจำลองเวรเรียบร้อย!`, "success");
        setNewName("");
        setNewEmail("");
        setNewRole("Registered Nurse");
        setNewIsAdmin(false);
      };

      const handleDeleteMember = (memberId) => {
        if (memberId === activeUser.id) {
          addToast("คุณไม่สามารถลบบัญชีตัวเองขณะล็อกอินอยู่ได้", "error");
          return;
        }

        const member = staffList.find(s => s.id === memberId);
        writeStaff(staffList.filter(s => s.id !== memberId));
        
        // Remove shifts of deleted user
        const updatedMaster = { ...shiftMaster };
        Object.keys(updatedMaster).forEach(mKey => {
          if (updatedMaster[mKey] && updatedMaster[mKey][memberId]) {
            delete updatedMaster[mKey][memberId];
          }
        });
        writeShifts(updatedMaster);

        addToast(`ลบข้อมูลพนักงาน คุณ${member.name} เรียบร้อย`, "success");
      };

      const handleResetRoster = () => {
        const updatedMaster = { ...shiftMaster };
        updatedMaster[selectedMonth] = getInitialShifts(staffList, monthDateProperties.daysCount);

      const handleSubmit = (e) => {
        e.preventDefault();
        onLogin(email);
      };

      const handleQuickSelect = (mockEmail) => {
        setEmail(mockEmail);

      };

      const handleConfigSave = (e) => {
        e.preventDefault();
        onSaveConfig({ apiKey, authDomain, databaseURL, projectId, appId });

      const handleRegisterSubmit = (e) => {
        e.preventDefault();
        if (!regEmail.toLowerCase().endsWith("@gmail.com")) {
          alert("กรุณาใช้อีเมล @gmail.com เท่านั้น");
          return;
        }
        const success = onRegister(regName, regEmail, regRole, regAvatar);
        if (success) {
          // Reset form
          setRegName("");
          setRegEmail("");
          setShowRegisterForm(false);
        }
      };

      return (
        <div class="flex-1 flex items-center justify-center p-4 md:p-8 min-h-screen">
          <div class="max-w-md w-full bg-white rounded-3xl shadow-premium border border-slate-100 overflow-hidden flex flex-col justify-between">
            
            {showConfigEditor ? (
              // Firebase Config Editor inside Login Screen
              <div class="p-6 md:p-8 space-y-6 font-sans">
                <div class="border-b border-slate-100 pb-3">
                  <h3 class="font-bold text-base text-slate-800">ตั้งค่าการเชื่อมต่อ Firebase</h3>
                  <p class="text-xs text-slate-400 mt-1">ตั้งค่าหรือยกเลิกการใช้ Firebase เพื่อแก้ปัญหาเข้าระบบไม่ได้</p>
                </div>

                <form onSubmit={handleConfigSave} class="space-y-4 text-left">
                  <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">API Key</label>
                    <input
                      type="text"
                      required
                      value={apiKey}
                      onChange={(e) => setApiKey(e.target.value)}
                      placeholder="AIzaSy..."
                      class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-brand-500 font-semibold min-h-[40px]"
                    />
                  </div>
                  <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Database URL</label>
                    <input
                      type="text"
                      required
                      value={databaseURL}
                      onChange={(e) => setDatabaseURL(e.target.value)}
                      placeholder="https://your-app.firebaseio.com"
                      class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-brand-500 font-semibold min-h-[40px]"
                    />
                  </div>
                  <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Project ID</label>
                    <input
                      type="text"
                      required
                      value={projectId}
                      onChange={(e) => setProjectId(e.target.value)}
                      placeholder="your-project-id"
                      class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-brand-500 font-semibold min-h-[40px]"
                    />
                  </div>

                  <div class="flex gap-2 pt-2">
                    <button
                      type="button"
                      onClick={() => setShowConfigEditor(false)}
                      class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs py-2.5 rounded-xl cursor-pointer min-h-[40px]"
                    >
                      ย้อนกลับ
                    </button>
                    <button
                      type="submit"
                      class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-bold text-xs py-2.5 rounded-xl cursor-pointer shadow-sm min-h-[40px]"
                    >
                      บันทึกและเชื่อมต่อใหม่
                    </button>
                  </div>
                </form>
              </div>
            ) : showRegisterForm ? (
              // Self Registration Sign-Up Form
              <div class="p-6 md:p-8 space-y-6 font-sans">
                <div class="border-b border-slate-100 pb-3">
                  <h3 class="font-bold text-base text-slate-800">สมัครสมาชิกพนักงานใหม่</h3>
                  <p class="text-xs text-slate-400 mt-1">กรอกข้อมูลพนักงานเพื่อรับสิทธิ์และตารางเวรจำลองทันที</p>
                </div>

                <form onSubmit={handleRegisterSubmit} class="space-y-4 text-left">
                  <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">ชื่อ-นามสกุล</label>
                    <input
                      type="text"
                      required
                      value={regName}
                      onChange={(e) => setRegName(e.target.value)}
                      placeholder="เช่น มานี รักดี"
                      class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-brand-500 font-semibold min-h-[40px]"
                    />
                  </div>

                  <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">อีเมล Gmail</label>
                    <input
                      type="email"
                      required
                      value={regEmail}
                      onChange={(e) => setRegEmail(e.target.value)}
                      placeholder="username@gmail.com"
                      class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-brand-500 font-semibold min-h-[40px]"
                    />
                  </div>

                  <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">บทบาทหน้าที่</label>
                    <select
                      value={regRole}
                      onChange={(e) => setRegRole(e.target.value)}
                      class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-xs rounded-xl px-3 py-2.5 focus:outline-none focus:ring-1 focus:ring-brand-500 font-semibold cursor-pointer min-h-[40px]"
                    >
                      <option value="Registered Nurse">Registered Nurse (พยาบาลวิชาชีพ)</option>
                      <option value="พยาบาลวิชาชีพชำนาญการพิเศษ">พยาบาลวิชาชีพชำนาญการพิเศษ</option>
                      <option value="พยาบาลวิชาชีพชำนาญการ">พยาบาลวิชาชีพชำนาญการ</option>
                      <option value="จพ.สาธารณสุขชำนาญงาน">จพ.สาธารณสุขชำนาญงาน</option>
                      <option value="Practical Nurse">Practical Nurse (ผู้ช่วยพยาบาล)</option>
                    </select>
                  </div>

                  <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">เลือกรูปประจำตัว (Avatar)</label>
                    <div class="grid grid-cols-4 gap-2 pt-1">
                      {avatarList.map(emoji => (
                        <button
                          type="button"
                          key={emoji}
                          onClick={() => setRegAvatar(emoji)}
                          className={`p-2 border text-xl rounded-xl cursor-pointer transition-all flex items-center justify-center min-h-[40px] ${
                            regAvatar === emoji 
                              ? "bg-brand-50 border-brand-500 ring-2 ring-brand-100" 
                              : "bg-slate-50 border-slate-200 hover:bg-slate-100"
                          }`}
                        >
                          {emoji}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div class="flex gap-2 pt-2">
                    <button
                      type="button"
                      onClick={() => setShowRegisterForm(false)}
                      class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs py-2.5 rounded-xl cursor-pointer min-h-[40px]"
                    >
                      ย้อนกลับ
                    </button>
                    <button
                      type="submit"
                      class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-bold text-xs py-2.5 rounded-xl cursor-pointer shadow-sm min-h-[40px]"
                    >
                      สมัครและเข้าระบบทันที
                    </button>
                  </div>
                </form>
              </div>
            ) : (
              // Simulated Gmail Login UI
              <div class="p-6 md:p-8 space-y-6">
                <div class="flex flex-col items-center text-center space-y-3">
                  <div class="flex text-2xl font-bold font-sans tracking-tight">
                    <span class="text-blue-500">G</span>
                    <span class="text-red-500">o</span>
                    <span class="text-yellow-500">o</span>
                    <span class="text-blue-500">g</span>
                    <span class="text-green-500">l</span>
                    <span class="text-red-500">e</span>
                  </div>
                  <h2 class="font-bold text-slate-800 text-lg md:text-xl font-sans">ลงชื่อเข้าใช้งานด้วยบัญชี Google</h2>
                  <p class="text-xs text-slate-400">เพื่อเริ่มใช้งานแอปพลิเคชัน ShiftSync Pro</p>
                </div>

                {/* Connection Status Card */}
                {firebaseConfig && (
                  <div class="p-3.5 rounded-2xl border border-slate-100 bg-slate-50 flex items-center justify-between text-xs font-semibold">
                    <div class="flex items-center gap-2">
                      <span class={`w-2 h-2 rounded-full ${isFirebaseConnected ? "bg-emerald-500" : "bg-amber-500 animate-pulse"}`}></span>
                      <span class="text-slate-600">
                        {isFirebaseConnected ? "เชื่อมต่อคลาวด์ Firebase แล้ว" : "กำลังโหลด / เชื่อมต่อคลาวด์ไม่สำเร็จ"}
                      </span>
                    </div>
                    
                    <button
                      onClick={() => onSaveConfig(null)}
                      class="text-rose-600 hover:text-rose-700 font-bold hover:underline cursor-pointer"
                    >
                      ตัดการเชื่อมต่อ (Local Mode)
                    </button>
                  </div>
                )}

                <form onSubmit={handleSubmit} class="space-y-4">
                  <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">ที่อยู่อีเมล Gmail</label>
                    <input
                      type="email"
                      required
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      placeholder="กรอกชื่อผู้ใช้ @gmail.com"
                      class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/20 font-semibold min-h-[44px]"
                    />
                  </div>

                  <div class="flex gap-2">
                    <button
                      type="button"
                      onClick={() => setShowRegisterForm(true)}
                      class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl text-sm transition-all cursor-pointer min-h-[44px]"
                    >
                      สมัครสมาชิกใหม่
                    </button>
                    <button
                      type="submit"
                      class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-premium text-sm transition-all duration-200 cursor-pointer min-h-[44px]"
                    >
                      ลงชื่อเข้าใช้งาน
                    </button>
                  </div>
                </form>

                <div class="border-t border-slate-100 pt-6 space-y-3.5">
                  <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider text-center">หรือเลือกบัญชีทดสอบระบบด่วน (Quick Select)</span>
                  <div class="grid grid-cols-1 gap-2 max-h-56 overflow-y-auto custom-scrollbar pr-1">
                    {staffList.map(s => (
                      <button
                        key={s.id}
                        onClick={() => handleQuickSelect(s.email)}
                        class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 bg-slate-50/50 hover:bg-slate-50 hover:border-brand-500 transition-all text-left cursor-pointer focus:outline-none focus:ring-1 focus:ring-brand-500"
                      >
                        <span class="text-2xl">{s.avatar}</span>
                        <div class="flex-1 min-w-0">
                          <div class="flex items-center gap-1.5">
                            <h4 class="font-bold text-xs text-slate-700 truncate leading-none">{s.name}</h4>
                            {s.isAdmin && (
                              <span class="bg-indigo-50 text-indigo-600 text-[8px] font-bold px-1.5 py-0.5 rounded border border-indigo-100">ADMIN</span>
                            )}
                          </div>
                          <p class="text-[10px] text-slate-400 mt-1 truncate">{s.email}</p>
                        </div>
                        <span class="text-[10px] text-slate-500 font-bold bg-white px-2 py-1 rounded-lg border border-slate-200 whitespace-nowrap">{s.role.split(" ")[0]}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Settings Helper Button at the bottom of login */}
                <div class="text-center pt-2">
                  <button
                    type="button"
                    onClick={() => setShowConfigEditor(true)}
                    class="text-xs font-bold text-brand-600 hover:text-brand-700 hover:underline cursor-pointer"
                  >
                    ⚙️ ตั้งค่าความปลอดภัยและคีย์ Firebase
                  </button>
                </div>

              </div>
            )}

            <div class="px-6 py-4 bg-slate-50 text-center text-[10px] text-slate-400 font-semibold border-t border-slate-100">
              ShiftSync Pro v1.1.3 • IPD-6 Roster Management System
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
